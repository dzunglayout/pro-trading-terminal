name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # Mỗi 6 tiếng
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Wake up Streamlit app
        run: |
          python - <<'EOF'
          from selenium import webdriver
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import time, requests

          # ── Bước 1: curl ping trước ──
          try:
              r = requests.get(
                  "https://pro-trading-terminal-pudpz9huwuwsgpxt5j4hp9.streamlit.app/",
                  timeout=30
              )
              print(f"📡 Ping status: {r.status_code}")
          except Exception as e:
              print(f"⚠️ Ping failed: {e}")

          # ── Bước 2: Selenium wake up ──
          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          options.add_argument("--disable-gpu")

          driver = webdriver.Chrome(options=options)

          try:
              url = "https://pro-trading-terminal-pudpz9huwuwsgpxt5j4hp9.streamlit.app/"
              driver.get(url)
              print("🌐 Opened app...")
              time.sleep(5)

              # Click nút wake up nếu app đang sleep
              try:
                  btn = WebDriverWait(driver, 10).until(
                      EC.element_to_be_clickable((By.XPATH, "//button[contains(text(), 'Yes, get this app back up')]"))
                  )
                  btn.click()
                  print("✅ Clicked wake up button!")
                  time.sleep(20)  # Chờ app khởi động xong
              except:
                  print("✅ App already awake, no button found!")

              print(f"📄 Page title: {driver.title}")

          finally:
              driver.quit()
          EOF
