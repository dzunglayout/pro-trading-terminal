name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */23 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Streamlit App
        run: |
          echo "🚀 Pinging Streamlit app..."
          curl -L --max-time 60 -s -o /dev/null -w "Status: %{http_code}\n" \
            https://pro-trading-terminal-pudpz9huwuwsgpxt5j4hp9.streamlit.app/ || true
          echo "✅ Done"
