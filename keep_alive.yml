name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */12 * * *'  # Chạy mỗi 12 tiếng
  workflow_dispatch:          # Cho phép chạy thủ công trên GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Streamlit App
        run: |
          echo "🚀 Pinging Streamlit app..."
          STATUS=$(curl -L --max-time 30 -s -o /dev/null -w "%{http_code}" https://pro-trading-terminal-pudpz9huwuwsgpxt5j4hp9.streamlit.app)
          echo "✅ Response status: $STATUS"
